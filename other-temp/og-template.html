<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1200px;
  height: 630px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  overflow: hidden;
  position: relative;
}
.bg-grid {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,90,54,0.06) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,90,54,0.06) 1px, transparent 1px);
  background-size: 40px 40px;
}
.glow {
  position: absolute;
  width: 400px;
  height: 400px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255,90,54,0.15), transparent 70%);
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}
.content {
  position: relative;
  z-index: 1;
  text-align: center;
  color: #fff;
}
.logo-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 20px;
  margin-bottom: 28px;
}
.logo-row svg {
  width: 56px;
  height: 56px;
}
.brand {
  font-size: 42px;
  font-weight: 800;
  letter-spacing: -1px;
}
.brand span {
  color: #FF5A36;
}
.tagline {
  font-size: 22px;
  color: rgba(255,255,255,0.85);
  margin-bottom: 28px;
  font-weight: 400;
}
.chips {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  justify-content: center;
  max-width: 700px;
  margin: 0 auto;
}
.chip {
  background: rgba(255,90,54,0.15);
  border: 1px solid rgba(255,90,54,0.3);
  color: rgba(255,255,255,0.9);
  padding: 6px 16px;
  border-radius: 16px;
  font-size: 15px;
  font-weight: 500;
}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="glow"></div>
<div class="content">
  <div class="logo-row">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16">
      <rect width="16" height="16" fill="none"/>
      <g fill="#3a0a0d">
        <rect x="1" y="5" width="1" height="3"/>
        <rect x="2" y="4" width="1" height="1"/>
        <rect x="2" y="8" width="1" height="1"/>
        <rect x="3" y="3" width="1" height="1"/>
        <rect x="3" y="9" width="1" height="1"/>
        <rect x="4" y="2" width="1" height="1"/>
        <rect x="4" y="10" width="1" height="1"/>
        <rect x="5" y="2" width="6" height="1"/>
        <rect x="11" y="2" width="1" height="1"/>
        <rect x="12" y="3" width="1" height="1"/>
        <rect x="12" y="9" width="1" height="1"/>
        <rect x="13" y="4" width="1" height="1"/>
        <rect x="13" y="8" width="1" height="1"/>
        <rect x="14" y="5" width="1" height="3"/>
        <rect x="5" y="11" width="6" height="1"/>
        <rect x="4" y="12" width="1" height="1"/>
        <rect x="11" y="12" width="1" height="1"/>
        <rect x="3" y="13" width="1" height="1"/>
        <rect x="12" y="13" width="1" height="1"/>
        <rect x="5" y="14" width="6" height="1"/>
      </g>
      <g fill="#ff4f40">
        <rect x="5" y="3" width="6" height="1"/>
        <rect x="4" y="4" width="8" height="1"/>
        <rect x="3" y="5" width="10" height="1"/>
        <rect x="3" y="6" width="10" height="1"/>
        <rect x="3" y="7" width="10" height="1"/>
        <rect x="4" y="8" width="8" height="1"/>
        <rect x="5" y="9" width="6" height="1"/>
        <rect x="5" y="12" width="6" height="1"/>
        <rect x="6" y="13" width="4" height="1"/>
      </g>
      <g fill="#ff775f">
        <rect x="1" y="6" width="2" height="1"/>
        <rect x="2" y="5" width="1" height="1"/>
        <rect x="2" y="7" width="1" height="1"/>
        <rect x="13" y="6" width="2" height="1"/>
        <rect x="13" y="5" width="1" height="1"/>
        <rect x="13" y="7" width="1" height="1"/>
      </g>
      <g fill="#081016">
        <rect x="6" y="5" width="1" height="1"/>
        <rect x="9" y="5" width="1" height="1"/>
      </g>
      <g fill="#f5fbff">
        <rect x="6" y="4" width="1" height="1"/>
        <rect x="9" y="4" width="1" height="1"/>
      </g>
    </svg>
    <div class="brand">Open<span>Claw</span> 中文网</div>
  </div>
  <p class="tagline">开源自托管 AI 智能体 · 真正能做事的个人 AI 助手</p>
  <div class="chips">
    <span class="chip">WhatsApp</span>
    <span class="chip">Telegram</span>
    <span class="chip">Discord</span>
    <span class="chip">飞书</span>
    <span class="chip">钉钉</span>
    <span class="chip">企业微信</span>
    <span class="chip">20+ 平台</span>
  </div>
</div>
</body>
</html>
